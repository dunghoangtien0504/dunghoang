<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mind Map</title>
<script src="https://cdn.jsdelivr.net/npm/markmap-autoloader@0.16"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f172a; }
  .header {
    text-align: center;
    padding: 24px;
    background: linear-gradient(135deg, #1e3a5f, #0f172a);
    border-bottom: 1px solid #334155;
  }
  .header h1 { color: #f59e0b; font-size: 1.5rem; font-weight: 700; }
  .header p { color: #94a3b8; font-size: 0.85rem; margin-top: 4px; }
  #mindmap { width: 100%; height: calc(100vh - 90px); }
  .markmap { width: 100%; height: 100%; }
</style>
</head>
<body>
<div class="header">
  <h1>🧠 TIÊU ĐỀ MIND MAP</h1>
  <p>Mô tả ngắn về chủ đề</p>
</div>

<div id="mindmap">
<script type="text/template" class="markmap">
---
markmap:
  colorFreezeLevel: 2
  zoom: true
  pan: true
---

## 🚀 Nhánh Chính 3

- Ý con 3.2
- Ý con 3.3

## 📊 Nhánh Chính 4
- Ý con 4.1
- Ý con 4.2

## ⚡ Nhánh Chính 5
- Ý con 5.1

- Ý con 5.3

</script>
</div>
</body>
</html>
